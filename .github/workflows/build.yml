name: Build Shared Backpack Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - name: Create project structure
        run: |
          mkdir -p src/main/java/de/damyx/sharedbackpack
          mkdir -p src/main/resources

      - name: Write files
        run: |
          cat > src/main/resources/fabric.mod.json << 'EOF'
          {"schemaVersion":1,"id":"sharedbackpack","version":"1.0.0","name":"Shared Backpack","description":"Shared backpack for all players. Open with /bp or /backpack.","authors":["Damyx"],"license":"MIT","environment":"*","entrypoints":{"main":["de.damyx.sharedbackpack.SharedBackpackMod"]},"mixins":[],"depends":{"fabricloader":">=0.19.3","minecraft":"26.1","java":">=25","fabric-api":"*"}}
          EOF

          cat > src/main/java/de/damyx/sharedbackpack/SharedBackpackMod.java << 'EOF'
          package de.damyx.sharedbackpack;
          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.command.v2.CommandRegistrationCallback;
          import net.minecraft.server.MinecraftServer;
          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;
          public class SharedBackpackMod implements ModInitializer {
              public static final Logger LOGGER = LoggerFactory.getLogger("sharedbackpack");
              private static SharedBackpackInventory sharedInventory = null;
              @Override
              public void onInitialize() {
                  LOGGER.info("[SharedBackpack] Loaded! Use /bp or /backpack.");
                  CommandRegistrationCallback.EVENT.register((d,r,e) -> BackpackCommand.register(d));
              }
              public static SharedBackpackInventory getSharedInventory(MinecraftServer server) {
                  if (sharedInventory == null) sharedInventory = new SharedBackpackInventory(server);
                  return sharedInventory;
              }
          }
          EOF

          cat > src/main/java/de/damyx/sharedbackpack/SharedBackpackInventory.java << 'EOF'
          package de.damyx.sharedbackpack;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.inventory.SimpleInventory;
          import net.minecraft.server.MinecraftServer;
          import net.minecraft.server.network.ServerPlayerEntity;
          public class SharedBackpackInventory extends SimpleInventory {
              private final MinecraftServer server;
              public SharedBackpackInventory(MinecraftServer server) { super(54); this.server = server; }
              @Override
              public void markDirty() {
                  super.markDirty();
                  if (server == null) return;
                  for (ServerPlayerEntity p : server.getPlayerManager().getPlayerList())
                      if (p.currentScreenHandler instanceof SharedBackpackScreenHandler h) h.sendContentUpdates();
              }
              @Override public boolean canPlayerUse(PlayerEntity player) { return true; }
          }
          EOF

          cat > src/main/java/de/damyx/sharedbackpack/SharedBackpackScreenHandler.java << 'EOF'
          package de.damyx.sharedbackpack;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.entity.player.PlayerInventory;
          import net.minecraft.inventory.Inventory;
          import net.minecraft.screen.GenericContainerScreenHandler;
          import net.minecraft.screen.ScreenHandlerType;
          public class SharedBackpackScreenHandler extends GenericContainerScreenHandler {
              private final SharedBackpackInventory backpackInventory;
              public SharedBackpackScreenHandler(int id, PlayerInventory pi, SharedBackpackInventory inv) {
                  super(ScreenHandlerType.GENERIC_9X6, id, pi, inv, 6);
                  this.backpackInventory = inv;
                  inv.onOpen(pi.player);
              }
              public SharedBackpackScreenHandler(int id, PlayerInventory pi, Inventory inv) {
                  super(ScreenHandlerType.GENERIC_9X6, id, pi, inv, 6);
                  this.backpackInventory = null;
              }
              @Override public boolean canUse(PlayerEntity p) { return true; }
              @Override public void onClosed(PlayerEntity p) {
                  super.onClosed(p);
                  if (backpackInventory != null) backpackInventory.onClose(p);
              }
          }
          EOF

          cat > src/main/java/de/damyx/sharedbackpack/BackpackCommand.java << 'EOF'
          package de.damyx.sharedbackpack;
          import com.mojang.brigadier.CommandDispatcher;
          import net.minecraft.screen.SimpleNamedScreenHandlerFactory;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.command.ServerCommandSource;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;
          public class BackpackCommand {
              public static void register(CommandDispatcher<ServerCommandSource> d) {
                  d.register(CommandManager.literal("backpack").executes(c -> open(c.getSource())));
                  d.register(CommandManager.literal("bp").executes(c -> open(c.getSource())));
              }
              private static int open(ServerCommandSource src) {
                  if (!(src.getEntity() instanceof ServerPlayerEntity p)) return 0;
                  var inv = SharedBackpackMod.getSharedInventory(src.getServer());
                  p.openHandledScreen(new SimpleNamedScreenHandlerFactory(
                      (id, pi, pl) -> new SharedBackpackScreenHandler(id, pi, inv),
                      Text.literal("§6§lShared Backpack")));
                  return 1;
              }
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'sharedbackpack'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'net.fabricmc.fabric-loom' version '1.15-SNAPSHOT'
          }
          version = '1.0.0'
          group = 'de.damyx'
          base { archivesName = 'sharedbackpack' }
          dependencies {
              minecraft "com.mojang:minecraft:26.1"
              modImplementation "net.fabricmc:fabric-loader:0.19.3"
              implementation "net.fabricmc.fabric-api:fabric-api:0.153.0+26.1.2"
          }
          processResources {
              filesMatching("fabric.mod.json") { expand version: project.version }
          }
          java {
              sourceCompatibility = JavaVersion.VERSION_21
              targetCompatibility = JavaVersion.VERSION_21
          }
          tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
          EOF

          echo "org.gradle.jvmargs=-Xmx2G" > gradle.properties

      - name: Build
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: sharedbackpack-1.0.0
          path: build/libs/sharedbackpack-1.0.0.jar
